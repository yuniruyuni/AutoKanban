specre_dir = "docs/specres"

# AutoKanban は AI コーディングエージェントとカンバンを束ねるローカル専用アプリで、
# 仕様の主戦場はサーバー側 Usecase と tRPC/Callback ルーター。
# Phase 2 で client/src/pages と client/src/components を足す。
source_dirs = [
  "server/src/usecases",
  "server/src/presentation/trpc",
  "server/src/presentation/callback/routers",
  "server/src/presentation/sse/routers",
  "server/src/presentation/mcp",
  "server/src/models",
  "server/src/infra/db",
  "server/src/repositories/worktree",
  "client/src/store",
  "client/src/pages",
  "client/src/components",
  "client/src/lib",
]

target_extensions = ["ts", "tsx"]
# Model の index.ts には概念カードのマーカーを貼るので除外しない。
# tRPC / SSE / Callback の routers/index.ts は re-export のみで個別除外。
exclude_patterns = [
  "**/*.test.ts",
  "**/*.test.tsx",
  "**/*.stories.tsx",
  "**/dist/**",
  "**/routers/index.ts",
]

# カードのセクション見出しは日本語テンプレート（関連ファイル / 機能概要 / シナリオ ...）
language = "ja"

[health_check]
# 実績は ~27%。margin を取り 0.20 に設定。引き上げは client/src/components/atoms や
# client/src/lib の末端ユーティリティを除外するなどで対応する。
coverage = 0.20
# architecture/ のメタカードのうち `tests_are_layered_per_responsibility` と
# `typescript_is_the_single_language_across_stack` は特定ソースに紐付けられない設計で
# 意図的に orphan。実績 2 件 + 新規 meta カード 1 件分の余地として 3。
# これを超えたら「マーカーを付け忘れたか、カード自体が不要になったか」を確認する合図。
orphans = 3
index_age_hours = 336   # 2 週間（月1 verify 運用前提）
drifts = 10

[drift]
grace_days = 7
