name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install

      - name: Lint
        run: bun run check:lint

      - name: Typecheck
        run: bun run check:type

      - name: Test
        run: bun run check:test

      - name: Architecture check
        run: bun run check:arch

      - name: E2E tests
        run: bun run check:e2e
