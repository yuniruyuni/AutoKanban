name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Schema upgrade smoke test diffs server/schema/ against origin/main.
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2

      - run: bun install

      - name: Install specre CLI
        run: |
          curl --proto '=https' --tlsv1.2 -LsSf \
            https://github.com/yoshiakist/specre/releases/latest/download/specre-installer.sh \
            | sh
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Lint
        run: bun run check:lint

      - name: Typecheck
        run: bun run check:type

      - name: Test
        run: bun run check:test

      - name: Schema upgrade smoke test
        run: bun run --filter '@auto-kanban/server' check:schema-upgrade

      - name: Architecture check
        run: bun run check:arch

      - name: specre health check
        run: bun run check:specre
